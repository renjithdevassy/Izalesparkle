name: CI/CD

# Build on every push/PR to main; deploy to SmarterASP.NET only on push to main.
on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

# Don't run two deploys at once for the same branch.
concurrency:
  group: ci-cd-${{ github.ref }}
  cancel-in-progress: false

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET 10
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Restore
        run: dotnet restore IzaleSparkle.sln

      # Publishing the hosted Server project compiles the whole graph (Client WASM +
      # API + libraries) via the Blazor hosted packaging path and produces the
      # deployable output. This is the CI gate for PRs and the deploy source.
      # (A plain `dotnet build` of the .sln trips over MSB3030 on the WASM client.)
      - name: Publish
        run: dotnet publish IzaleSparkle.Server/IzaleSparkle.Server.csproj -c Release -o ${{ github.workspace }}/publish --no-restore

      # Downloadable build output (handy for manual deploys / rollback).
      - name: Upload publish artifact
        uses: actions/upload-artifact@v4
        with:
          name: izalesparkle-publish
          path: publish/
          retention-days: 14

      # ── DEPLOY (push to main only) ────────────────────────────────
      # Take the app offline first: dropping app_offline.htm makes IIS stop the
      # ASP.NET Core app and release its lock on the _framework files, so the
      # upload can overwrite them (otherwise: 550 "file in use by another process").
      - name: Take app offline
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        run: |
          curl -sS --connect-timeout 30 -T app_offline.htm \
            "ftp://${{ secrets.FTP_SERVER }}/app_offline.htm" \
            --user "${{ secrets.FTP_USERNAME }}:${{ secrets.FTP_PASSWORD }}"

      # Config files are excluded so the live host keeps its own real
      # appsettings (DB connection, Gmail app password, JWT secret).
      - name: Deploy to SmarterASP.NET via FTP
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          server:   ${{ secrets.FTP_SERVER }}
          username: ${{ secrets.FTP_USERNAME }}
          password: ${{ secrets.FTP_PASSWORD }}
          # Plain FTP: SmarterASP's FTPS data channel resets from the GitHub runner
          # (ECONNRESET on the data socket). Login + transfer over plain FTP is stable.
          protocol: ftp
          # The published app lives at the FTP root on SmarterASP (root already holds
          # the server DLLs + its own wwwroot subfolder), so deploy to ./ not /wwwroot/.
          server-dir: ./
          local-dir: ./publish/
          # Only changed files are uploaded (diff sync). Excluded paths are never
          # uploaded AND never deleted on the server, so the host keeps its own
          # config and runtime data (DataProtection keys, uploaded images).
          exclude: |
            **/.git*
            **/.git*/**
            **/node_modules/**
            appsettings.json
            appsettings.Development.json
            appsettings.Production.json
            App_Data/**
            wwwroot/uploads/**
            app_offline.htm

      # Bring the app back online by removing app_offline.htm — runs even if the
      # deploy failed, so the site never gets stuck on the offline page.
      - name: Bring app online
        if: always() && github.event_name == 'push' && github.ref == 'refs/heads/main'
        run: |
          curl -sS --connect-timeout 30 -o /dev/null \
            "ftp://${{ secrets.FTP_SERVER }}/" \
            --user "${{ secrets.FTP_USERNAME }}:${{ secrets.FTP_PASSWORD }}" \
            -Q "DELE app_offline.htm" || true
