<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=1920">
    <meta name="robots" content="noindex, nofollow">
    <title>Izale Sparkle — TV Dashboard</title>
    <style>
    * { margin: 0; padding: 0; box-sizing: border-box; outline: none; }
    :root {
        --gold: #C9A84C; --gold-light: #E8C96A;
        --dark: #0A0A0F; --dark2: #12121A; --dark3: #1A1A26;
        --card: #1E1E2E; --border: #2A2A3E;
        --text: #FFFFFF; --text-muted: #8888AA;
        --green: #2ECC71; --orange: #F39C12; --red: #E74C3C; --blue: #3498DB;
    }
    html, body {
        width: 1920px; height: 1080px;
        background: var(--dark); color: var(--text);
        font-family: 'Samsung Sharp Sans', 'Helvetica Neue', Arial, sans-serif;
        font-size: 28px; overflow: hidden; user-select: none;
    }
    .screen { position: absolute; top: 0; left: 0; width: 1920px; height: 1080px; display: none; }
    .screen.active { display: flex; }
    #login-screen {
        flex-direction: column; align-items: center; justify-content: center;
        background: linear-gradient(135deg, #0A0A0F 0%, #12121A 50%, #0A0A0F 100%);
    }
    .login-logo { font-size: 52px; font-weight: 800; color: var(--gold); letter-spacing: 4px; margin-bottom: 12px; }
    .login-logo span { color: var(--text); }
    .login-subtitle { font-size: 26px; color: var(--text-muted); margin-bottom: 60px; }
    .login-box { background: var(--card); border: 1px solid var(--border); border-radius: 20px; padding: 60px 80px; width: 680px; }
    .login-error { color: var(--gold); font-size: 28px; font-weight: 700; text-align: center; min-height: 42px; }
    #main-screen { flex-direction: row; }
    .sidebar {
        width: 300px; height: 1080px; background: var(--dark2);
        border-right: 1px solid var(--border); display: flex; flex-direction: column;
        padding: 40px 0; flex-shrink: 0;
    }
    .sidebar-logo { font-size: 30px; font-weight: 800; color: var(--gold); letter-spacing: 2px; padding: 0 30px; margin-bottom: 50px; }
    .nav-item {
        display: flex; align-items: center; gap: 20px; padding: 24px 30px;
        font-size: 26px; color: var(--text-muted); cursor: pointer;
        border-left: 4px solid transparent; transition: all 0.2s;
    }
    .nav-item .nav-icon { font-size: 32px; }
    .nav-item.active, .nav-item.focused { color: var(--gold); background: rgba(201,168,76,0.08); border-left-color: var(--gold); }
    .sidebar-spacer { flex: 1; }
    .sidebar-time { padding: 0 30px 20px; color: var(--text-muted); font-size: 22px; white-space: pre-line; }
    .content { flex: 1; height: 1080px; overflow: hidden; position: relative; }
    .page { position: absolute; top: 0; left: 0; width: 100%; height: 100%; display: none; padding: 50px 60px; overflow: hidden; }
    .page.active { display: block; }
    .page-title { font-size: 40px; font-weight: 700; color: var(--text); margin-bottom: 40px; }
    .stats-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 30px; margin-bottom: 40px; }
    .stat-card { background: var(--card); border: 1px solid var(--border); border-radius: 16px; padding: 36px 30px; position: relative; overflow: hidden; }
    .stat-card::before { content: ''; position: absolute; top: 0; left: 0; right: 0; height: 3px; }
    .stat-card.gold::before  { background: var(--gold); }
    .stat-card.green::before { background: var(--green); }
    .stat-card.orange::before{ background: var(--orange); }
    .stat-card.blue::before  { background: var(--blue); }
    .stat-icon { font-size: 40px; margin-bottom: 16px; }
    .stat-value { font-size: 52px; font-weight: 800; color: var(--text); line-height: 1; margin-bottom: 8px; }
    .stat-label { font-size: 22px; color: var(--text-muted); text-transform: uppercase; letter-spacing: 1px; }
    .section-title { font-size: 28px; font-weight: 600; color: var(--gold); margin-bottom: 20px; text-transform: uppercase; letter-spacing: 1px; }
    .orders-table { width: 100%; border-collapse: collapse; }
    .orders-table th {
        text-align: left; font-size: 20px; color: var(--text-muted);
        text-transform: uppercase; letter-spacing: 1px; padding: 14px 20px;
        border-bottom: 1px solid var(--border);
    }
    .orders-table td { padding: 18px 20px; font-size: 24px; border-bottom: 1px solid rgba(255,255,255,0.04); }
    .orders-table tr.focused td, .orders-table tr:focus td {
        background: rgba(201,168,76,0.22);
        color: #FFF;
    }
    .orders-table tr.focused td:first-child {
        border-left: 8px solid var(--gold);
        padding-left: 12px;
    }
    .orders-table tr.focused td {
        border-top: 2px solid var(--gold);
        border-bottom: 2px solid var(--gold);
    }
    .orders-table tr.focused td:last-child { border-right: 8px solid var(--gold); }
    .badge { display: inline-block; padding: 6px 16px; border-radius: 20px; font-size: 20px; font-weight: 600; }
    .badge-pending    { background: rgba(243,156,18,0.2);  color: var(--orange); }
    .badge-processing { background: rgba(52,152,219,0.2);  color: var(--blue); }
    .badge-delivered  { background: rgba(46,204,113,0.2);  color: var(--green); }
    .badge-cancelled  { background: rgba(231,76,60,0.2);   color: var(--red); }
    .badge-shipped    { background: rgba(155,89,182,0.2);  color: #9B59B6; }
    #orders-page .orders-table td { font-size: 22px; }
    .orders-list-wrap { height: 860px; overflow: hidden; }
    #detail-page .detail-header { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 40px; }
    .detail-number { font-size: 36px; font-weight: 700; color: var(--gold); }
    .detail-date   { font-size: 22px; color: var(--text-muted); margin-top: 8px; }
    .detail-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 40px; }
    .detail-section { background: var(--card); border: 1px solid var(--border); border-radius: 16px; padding: 30px; }
    .detail-section h3 {
        font-size: 22px; color: var(--text-muted); text-transform: uppercase; letter-spacing: 1px;
        margin-bottom: 20px; border-bottom: 1px solid var(--border); padding-bottom: 14px;
    }
    .detail-row { display: flex; justify-content: space-between; padding: 10px 0; font-size: 24px; }
    .detail-row .label { color: var(--text-muted); }
    .detail-row .value { font-weight: 600; }
    .items-list { margin-top: 10px; }
    .item-row {
        display: flex; justify-content: space-between; align-items: center;
        padding: 12px 0; border-bottom: 1px solid rgba(255,255,255,0.06); font-size: 22px;
    }
    .item-name { color: var(--text); }
    .item-price { color: var(--gold); font-weight: 600; }
    .item-left { display: flex; align-items: center; gap: 20px; }
    .item-thumb {
        width: 90px; height: 90px; object-fit: cover; border-radius: 10px;
        border: 1px solid var(--border); background: var(--dark3); flex-shrink: 0;
    }
    .row-thumbs { display: flex; align-items: center; }
    .row-thumb {
        width: 64px; height: 64px; object-fit: cover; border-radius: 8px;
        border: 2px solid var(--dark2); background: var(--dark3);
        margin-right: -16px;
    }
    .row-thumb-more {
        width: 64px; height: 64px; border-radius: 8px; background: var(--dark3);
        border: 2px solid var(--dark2); color: var(--text-muted); font-size: 20px;
        display: flex; align-items: center; justify-content: center;
    }
    #notification {
        position: fixed; top: -200px; left: 50%; transform: translateX(-50%);
        background: linear-gradient(135deg, #1A2A1A, #0D1F0D);
        border: 2px solid var(--green); border-radius: 16px; padding: 28px 50px;
        display: flex; align-items: center; gap: 24px; z-index: 9999;
        transition: top 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        min-width: 600px; box-shadow: 0 8px 40px rgba(46,204,113,0.3);
    }
    #notification.show { top: 40px; }
    .notif-icon { font-size: 48px; }
    .notif-text .notif-title { font-size: 30px; font-weight: 700; color: var(--green); }
    .notif-text .notif-body { font-size: 24px; color: var(--text-muted); margin-top: 4px; }
    .loading { display: flex; align-items: center; justify-content: center; height: 300px; color: var(--text-muted); font-size: 28px; gap: 20px; }
    .spinner { width: 40px; height: 40px; border: 3px solid var(--border); border-top-color: var(--gold); border-radius: 50%; animation: spin 0.8s linear infinite; }
    @keyframes spin { to { transform: rotate(360deg); } }
    </style>
</head>
<body>

<!-- LOGIN / STATUS SCREEN -->
<div id="login-screen" class="screen active">
    <div class="login-logo">IZALE <span>SPARKLE</span></div>
    <div class="login-subtitle">Admin Dashboard v3.2</div>
    <div class="login-box">
        <div class="login-error" id="login-error">Starting...</div>
    </div>
</div>

<!-- MAIN SCREEN -->
<div id="main-screen" class="screen">
    <nav class="sidebar">
        <div class="sidebar-logo">✦ IZALE</div>
        <div class="nav-item active" data-page="dashboard" data-nav="sidebar"><span class="nav-icon">📊</span> Dashboard</div>
        <div class="nav-item" data-page="orders" data-nav="sidebar"><span class="nav-icon">📦</span> Orders</div>
        <div class="sidebar-spacer"></div>
        <div class="sidebar-time" id="sidebar-time"></div>
    </nav>
    <div class="content">
        <div id="dashboard-page" class="page active">
            <div class="page-title">Dashboard</div>
            <div class="stats-grid" id="stats-grid">
                <div class="stat-card gold"><div class="stat-icon">💰</div><div class="stat-value" id="stat-revenue">—</div><div class="stat-label">Total Revenue</div></div>
                <div class="stat-card green"><div class="stat-icon">📦</div><div class="stat-value" id="stat-orders">—</div><div class="stat-label">Total Orders</div></div>
                <div class="stat-card orange"><div class="stat-icon">⏳</div><div class="stat-value" id="stat-pending">—</div><div class="stat-label">Pending</div></div>
                <div class="stat-card blue"><div class="stat-icon">☀️</div><div class="stat-value" id="stat-today">—</div><div class="stat-label">Today Revenue</div></div>
            </div>
            <div class="section-title">Recent Orders</div>
            <div id="recent-orders-wrap"><div class="loading"><div class="spinner"></div> Loading...</div></div>
        </div>
        <div id="orders-page" class="page">
            <div class="page-title">All Orders</div>
            <div class="orders-list-wrap" id="orders-list-wrap"><div class="loading"><div class="spinner"></div> Loading...</div></div>
        </div>
        <div id="detail-page" class="page">
            <div class="detail-header">
                <div>
                    <div class="detail-number" id="detail-number"></div>
                    <div class="detail-date" id="detail-date"></div>
                </div>
                <div id="detail-status"></div>
            </div>
            <div class="detail-grid" id="detail-grid"></div>
        </div>
    </div>
</div>

<!-- NOTIFICATION BANNER -->
<div id="notification">
    <div class="notif-icon">🛍️</div>
    <div class="notif-text">
        <div class="notif-title" id="notif-title">New Order!</div>
        <div class="notif-body" id="notif-body"></div>
    </div>
</div>

<script>
'use strict';

// Same-origin API — no CORS anywhere.
var API = '';

var state = {
    token: null,
    currentPage: 'dashboard',
    prevPage: 'dashboard',
    orders: [],
    knownOrderIds: {},
    seeded: false,
    focusGroup: 'sidebar',
    focusIndex: 0,
    pollTimer: null
};

function $(id) { return document.getElementById(id); }
function fmt(n) { return '£' + Number(n).toLocaleString('en-GB', { minimumFractionDigits: 2, maximumFractionDigits: 2 }); }
function fmtDate(d) { return new Date(d).toLocaleDateString('en-GB', { day: '2-digit', month: 'short', year: 'numeric', hour: '2-digit', minute: '2-digit' }); }

function showStatus(msg, color) {
    var el = $('login-error');
    el.textContent = msg;
    el.style.color = color || '#C9A84C';
}

function api(path) {
    return new Promise(function(resolve, reject) {
        var sep = path.indexOf('?') >= 0 ? '&' : '?';
        var url = API + path + (state.token ? sep + 'access_token=' + encodeURIComponent(state.token) : '');
        var xhr = new XMLHttpRequest();
        xhr.open('GET', url, true);
        xhr.timeout = 10000;
        xhr.onload = function() {
            if (xhr.status < 200 || xhr.status >= 300) return reject(new Error(xhr.status));
            try { resolve(JSON.parse(xhr.responseText)); } catch(e) { reject(e); }
        };
        xhr.onerror = function() { reject(new Error('network')); };
        xhr.ontimeout = function() { reject(new Error('timeout')); };
        xhr.send();
    });
}

// ── LOGIN ────────────────────────────────────────────────────────
// Credentials arrive in the URL fragment from the TV wrapper app
// (#e=<email>&p=<password>). The fragment never reaches the server.
function getHashCreds() {
    var h = window.location.hash.replace(/^#/, '');
    var creds = {};
    var parts = h.split('&');
    for (var i = 0; i < parts.length; i++) {
        var kv = parts[i].split('=');
        if (kv.length === 2) creds[kv[0]] = decodeURIComponent(kv[1]);
    }
    return (creds.e && creds.p) ? creds : null;
}

function doLogin(email, pass) {
    showStatus('Signing in...');
    var xhr = new XMLHttpRequest();
    xhr.open('POST', API + '/api/auth/login', true);
    xhr.setRequestHeader('Content-Type', 'application/json');
    xhr.timeout = 15000;
    xhr.onload = function() {
        var data;
        try { data = JSON.parse(xhr.responseText); }
        catch(e) { showStatus('Bad server response (' + xhr.status + ')', '#E74C3C'); return; }
        if (data.success && data.token) {
            state.token = data.token;
            try { sessionStorage.setItem('izale_tv_token', data.token); } catch(e) {}
            enterMain();
        } else {
            showStatus('Login failed: ' + (data.message || xhr.status), '#E74C3C');
        }
    };
    xhr.onerror = function() { showStatus('Network error — check connection', '#E74C3C'); };
    xhr.ontimeout = function() { showStatus('Server timeout', '#E74C3C'); };
    xhr.send(JSON.stringify({ email: email, password: pass }));
}

// ── NOTIFICATION ─────────────────────────────────────────────────
function showNotification(title, body) {
    $('notif-title').textContent = title;
    $('notif-body').textContent = body;
    var el = $('notification');
    el.classList.add('show');
    try {
        var ctx = new (window.AudioContext || window.webkitAudioContext)();
        var osc = ctx.createOscillator();
        var gain = ctx.createGain();
        osc.connect(gain); gain.connect(ctx.destination);
        osc.frequency.value = 880;
        gain.gain.setValueAtTime(0.3, ctx.currentTime);
        gain.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + 0.6);
        osc.start(); osc.stop(ctx.currentTime + 0.6);
    } catch(e) {}
    setTimeout(function() { el.classList.remove('show'); }, 5000);
}

function badge(status) {
    var map = { Pending: 'pending', Processing: 'processing', Shipped: 'shipped', Delivered: 'delivered', Cancelled: 'cancelled' };
    return '<span class="badge badge-' + (map[status] || 'pending') + '">' + status + '</span>';
}

// ── SCREENS / PAGES ──────────────────────────────────────────────
function showScreen(id) {
    var screens = document.querySelectorAll('.screen');
    for (var i = 0; i < screens.length; i++) screens[i].classList.remove('active');
    $(id).classList.add('active');
}

function showPage(name) {
    var pages = document.querySelectorAll('.page');
    for (var i = 0; i < pages.length; i++) pages[i].classList.remove('active');
    $(name + '-page').classList.add('active');
    var navs = document.querySelectorAll('.nav-item');
    for (var j = 0; j < navs.length; j++) navs[j].classList.remove('active');
    var navEl = document.querySelector('[data-page="' + name + '"]');
    if (navEl) navEl.classList.add('active');
    state.currentPage = name;
    if (name === 'dashboard') loadDashboard();
    if (name === 'orders') loadOrders();
}

// ── DASHBOARD ────────────────────────────────────────────────────
function loadDashboard() {
    api('/api/admin/dashboard').then(function(res) {
        var d = res.data;
        $('stat-revenue').textContent = fmt(d.totalRevenue);
        $('stat-orders').textContent  = d.totalOrders;
        $('stat-pending').textContent = d.pendingOrders;
        $('stat-today').textContent   = fmt(d.todayRevenue);
        renderRecentOrders(d.recentOrders);
    }).catch(function() {
        $('recent-orders-wrap').innerHTML = '<div class="loading" style="color:#E74C3C">Failed to load dashboard</div>';
    });
}

function renderRecentOrders(orders) {
    if (!orders || orders.length === 0) {
        $('recent-orders-wrap').innerHTML = '<div class="loading">No orders yet</div>';
        return;
    }
    var rows = '';
    var list = orders.slice(0, 6);
    for (var i = 0; i < list.length; i++) {
        var o = list[i];
        rows += '<tr><td>' + o.orderNumber + '</td><td>' + o.customerEmail + '</td><td>' + fmt(o.total) + '</td><td>' + badge(o.status) + '</td><td>' + fmtDate(o.createdAt) + '</td></tr>';
    }
    $('recent-orders-wrap').innerHTML =
        '<table class="orders-table"><thead><tr><th>Order #</th><th>Customer</th><th>Total</th><th>Status</th><th>Date</th></tr></thead><tbody>' + rows + '</tbody></table>';
}

// ── ORDERS PAGE ──────────────────────────────────────────────────
function loadOrders() {
    $('orders-list-wrap').innerHTML = '<div class="loading"><div class="spinner"></div> Loading...</div>';
    api('/api/admin/orders').then(function(res) {
        state.orders = (res.data && res.data.orders) || res.data || [];
        renderOrdersTable();
    }).catch(function() {
        $('orders-list-wrap').innerHTML = '<div class="loading" style="color:#E74C3C">Failed to load orders</div>';
    });
}

function renderOrdersTable() {
    var orders = state.orders;
    if (!orders.length) {
        $('orders-list-wrap').innerHTML = '<div class="loading">No orders found</div>';
        return;
    }
    var rows = '';
    for (var i = 0; i < orders.length; i++) {
        var o = orders[i];
        rows += '<tr data-index="' + i + '" class="order-row"><td>' + orderThumbs(o) + '</td><td>' + o.orderNumber + '</td><td>' + o.customerEmail + '</td><td>' + fmt(o.total) + '</td><td>' + badge(o.status) + '</td><td>' + (o.paymentMethod || 'Bank Transfer') + '</td><td>' + fmtDate(o.createdAt) + '</td></tr>';
    }
    $('orders-list-wrap').innerHTML =
        '<table class="orders-table"><thead><tr><th>Items</th><th>Order #</th><th>Customer</th><th>Total</th><th>Status</th><th>Payment</th><th>Date</th></tr></thead><tbody>' + rows + '</tbody></table>';
    orderFocusIndex = 0;
    updateOrderFocus();
}

// Up to 3 overlapping product thumbnails for an order row, "+N" if more.
function thumbImg(url, cls) {
    return '<img class="' + cls + '" src="' + url + '" onerror="this.style.display=\'none\'">';
}
function orderThumbs(o) {
    var items = o.items || [];
    var html = '<div class="row-thumbs">';
    var shown = 0;
    for (var i = 0; i < items.length && shown < 3; i++) {
        if (items[i].imageUrl) { html += thumbImg(items[i].imageUrl, 'row-thumb'); shown++; }
    }
    if (items.length > shown) html += '<div class="row-thumb-more">+' + (items.length - shown) + '</div>';
    return html + '</div>';
}

// ── ORDER DETAIL ─────────────────────────────────────────────────
function openOrderDetail(index) {
    var o = state.orders[index];
    if (!o) return;
    $('detail-number').textContent = o.orderNumber;
    $('detail-date').textContent   = fmtDate(o.createdAt);
    $('detail-status').innerHTML   = badge(o.status);
    var items = '';
    var list = o.items || [];
    for (var i = 0; i < list.length; i++) {
        var it = list[i];
        items += '<div class="item-row"><div class="item-left">' +
            (it.imageUrl ? thumbImg(it.imageUrl, 'item-thumb') : '') +
            '<div class="item-name">' + it.productName + ' × ' + it.quantity + (it.size ? ' — ' + it.size : '') + '</div></div>' +
            '<div class="item-price">' + fmt(it.lineTotal) + '</div></div>';
    }
    $('detail-grid').innerHTML =
        '<div class="detail-section"><h3>Customer &amp; Shipping</h3>' +
        '<div class="detail-row"><span class="label">Email</span><span class="value">' + o.customerEmail + '</span></div>' +
        '<div class="detail-row"><span class="label">Name</span><span class="value">' + (o.shipFirstName || '') + ' ' + (o.shipLastName || '') + '</span></div>' +
        '<div class="detail-row"><span class="label">Address</span><span class="value">' + (o.shipLine1 || '') + ', ' + (o.shipCity || '') + '</span></div>' +
        '<div class="detail-row"><span class="label">Postcode</span><span class="value">' + (o.shipPostcode || '') + '</span></div>' +
        '<div class="detail-row"><span class="label">Payment</span><span class="value">' + (o.paymentMethod || 'Bank Transfer') + '</span></div></div>' +
        '<div class="detail-section"><h3>Order Summary</h3><div class="items-list">' + items + '</div>' +
        '<div class="detail-row" style="margin-top:16px"><span class="label">Subtotal</span><span class="value">' + fmt(o.subtotal) + '</span></div>' +
        '<div class="detail-row"><span class="label">Shipping</span><span class="value">' + fmt(o.shipping) + '</span></div>' +
        '<div class="detail-row"><span class="label">VAT</span><span class="value">' + fmt(o.vat) + '</span></div>' +
        (o.discount > 0 ? '<div class="detail-row"><span class="label">Discount</span><span class="value" style="color:#2ECC71">-' + fmt(o.discount) + '</span></div>' : '') +
        '<div class="detail-row" style="border-top:1px solid #2A2A3E;margin-top:10px;padding-top:10px"><span class="label" style="font-size:26px;font-weight:700">Total</span><span class="value" style="font-size:30px;color:#C9A84C">' + fmt(o.total) + '</span></div></div>';
    state.prevPage = state.currentPage;
    showPage('detail');
}

// ── POLLING ──────────────────────────────────────────────────────
function pollOrders() {
    api('/api/admin/orders').then(function(res) {
        var orders = (res.data && res.data.orders) || res.data || [];
        if (state.seeded) {
            for (var i = 0; i < orders.length; i++) {
                var o = orders[i];
                if (!state.knownOrderIds[o.id]) {
                    showNotification('New Order — ' + o.orderNumber, o.customerEmail + ' · ' + fmt(o.total));
                }
            }
        }
        for (var j = 0; j < orders.length; j++) state.knownOrderIds[orders[j].id] = true;
        state.seeded = true;
        if (state.currentPage === 'orders') { state.orders = orders; renderOrdersTable(); }
        if (state.currentPage === 'dashboard') loadDashboard();
    }).catch(function() {});
}

// ── CLOCK ────────────────────────────────────────────────────────
function startClock() {
    var el = $('sidebar-time');
    function tick() {
        var now = new Date();
        el.textContent = now.toLocaleTimeString('en-GB', { hour: '2-digit', minute: '2-digit' })
            + '\n' + now.toLocaleDateString('en-GB', { day: '2-digit', month: 'short' });
    }
    tick();
    setInterval(tick, 30000);
}

// ── ENTER MAIN ───────────────────────────────────────────────────
function enterMain() {
    showScreen('main-screen');
    state.focusGroup = 'sidebar';
    state.focusIndex = 0;
    updateSidebarFocus();
    startClock();
    loadDashboard();
    pollOrders();
    state.pollTimer = setInterval(pollOrders, 30000);
}

// ── REMOTE NAVIGATION ────────────────────────────────────────────
var KEY = { UP: 38, DOWN: 40, LEFT: 37, RIGHT: 39, ENTER: 13, BACK: 10009 };

function sidebarItems() { return document.querySelectorAll('.nav-item[data-nav="sidebar"]'); }

function updateSidebarFocus() {
    var items = sidebarItems();
    for (var i = 0; i < items.length; i++) items[i].classList.toggle('focused', i === state.focusIndex);
}

var orderFocusIndex = 0;
function updateOrderFocus() {
    var rows = document.querySelectorAll('.order-row');
    for (var i = 0; i < rows.length; i++) rows[i].classList.toggle('focused', i === orderFocusIndex);
    if (rows[orderFocusIndex]) rows[orderFocusIndex].scrollIntoView(false);
}

document.addEventListener('keydown', function(e) {
    var k = e.keyCode;

    if (k === KEY.BACK) {
        if (state.currentPage === 'detail') {
            showPage(state.prevPage || 'orders');
            state.focusGroup = 'content';
            e.preventDefault();
            return;
        }
        if (state.focusGroup === 'content') {
            state.focusGroup = 'sidebar';
            updateSidebarFocus();
            e.preventDefault();
            return;
        }
    }

    if (state.focusGroup === 'sidebar') {
        var items = sidebarItems();
        if (k === KEY.DOWN) {
            state.focusIndex = Math.min(state.focusIndex + 1, items.length - 1);
            updateSidebarFocus();
        } else if (k === KEY.UP) {
            state.focusIndex = Math.max(state.focusIndex - 1, 0);
            updateSidebarFocus();
        } else if (k === KEY.RIGHT || k === KEY.ENTER) {
            var focused = items[state.focusIndex];
            var page = focused ? focused.getAttribute('data-page') : null;
            if (page) { showPage(page); state.focusGroup = 'content'; orderFocusIndex = 0; }
        }
        return;
    }

    if (state.focusGroup === 'content') {
        if (k === KEY.LEFT) {
            state.focusGroup = 'sidebar';
            updateSidebarFocus();
            return;
        }
        if (state.currentPage === 'orders') {
            var rows = document.querySelectorAll('.order-row');
            if (k === KEY.DOWN) {
                orderFocusIndex = Math.min(orderFocusIndex + 1, rows.length - 1);
                updateOrderFocus();
            } else if (k === KEY.UP) {
                orderFocusIndex = Math.max(orderFocusIndex - 1, 0);
                updateOrderFocus();
            } else if (k === KEY.ENTER) {
                openOrderDetail(orderFocusIndex);
            }
        }
    }
});

// ── INIT ─────────────────────────────────────────────────────────
window.addEventListener('load', function() {
    if (window.tizen && tizen.tvinputdevice) {
        try { tizen.tvinputdevice.registerKey('Back'); } catch(e) {}
    }
    var saved = null;
    try { saved = sessionStorage.getItem('izale_tv_token'); } catch(e) {}
    var creds = getHashCreds();
    if (creds) {
        doLogin(creds.e, creds.p);
    } else if (saved) {
        state.token = saved;
        enterMain();
    } else {
        showStatus('No credentials. Launch from the TV app.', '#E74C3C');
    }
});
</script>
</body>
</html>
