<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover" />
  <meta name="theme-color" content="#1C1A16" />
  <title>Offline — Izale Sparkle</title>
  <style>
    :root{--gold:#C8973A;--cream:#FAF7EE;--charcoal:#1C1A16}
    *{margin:0;padding:0;box-sizing:border-box}
    body{font-family:'Georgia',serif;background:var(--charcoal);color:var(--cream);
         min-height:100vh;display:flex;flex-direction:column;align-items:center;
         justify-content:center;text-align:center;padding:2rem;
         padding-bottom:env(safe-area-inset-bottom,0)}
    .logo{font-size:1.8rem;letter-spacing:.3em;color:var(--cream);margin-bottom:.4rem}
    .logo span{color:var(--gold)}
    .tagline{font-size:.6rem;letter-spacing:.32em;text-transform:uppercase;color:rgba(245,240,225,.4);margin-bottom:3rem}
    .icon{font-size:3.5rem;margin-bottom:1.5rem;animation:float 3s ease-in-out infinite}
    h1{font-size:1.6rem;font-weight:400;color:var(--cream);margin-bottom:.8rem}
    h1 em{font-style:italic;color:var(--gold)}
    p{font-size:.82rem;color:rgba(245,240,225,.5);line-height:1.8;max-width:320px;margin-bottom:2.5rem}
    .retry{display:inline-block;padding:.9rem 2.4rem;background:var(--gold);color:var(--charcoal);
           font-family:inherit;font-size:.68rem;letter-spacing:.22em;text-transform:uppercase;
           font-weight:600;border:none;cursor:pointer;-webkit-tap-highlight-color:transparent}
    @keyframes float{0%,100%{transform:translateY(0)}50%{transform:translateY(-12px)}}
  </style>
</head>
<body>
  <div class="logo">Izale <span>✦</span> Sparkle</div>
  <div class="tagline">Where Every Look Sparkles</div>
  <div class="icon">📡</div>
  <h1>You're <em>Offline</em></h1>
  <p>It seems you've lost your connection. Your sparkle awaits — reconnect and we'll be right here.</p>
  <button class="retry" onclick="window.location.reload()">Try Again ✦</button>
</body>
</html>
