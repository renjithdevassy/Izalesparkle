    <!-- SERVICE WORKER REGISTRATION -->
    <script>
        if ('serviceWorker' in navigator && location.hostname === 'localhost') {
            navigator.serviceWorker.getRegistrations()
                .then(registrations => registrations.forEach(reg => reg.unregister()));
            caches?.keys?.()
                .then(keys => keys.forEach(key => caches.delete(key)));
        } else if ('serviceWorker' in navigator) {
            navigator.serviceWorker.register('service-worker.js', { scope: '/' })
                .then(reg => {
                    console.log('[SW] Registered:', reg.scope);
                    // Prompt user when update is available
                    reg.addEventListener('updatefound', () => {
                        const newWorker = reg.installing;
                        newWorker.addEventListener('statechange', () => {
                            if (newWorker.state === 'installed' && navigator.serviceWorker.controller) {
                                // Show update banner (handled in MainLayout)
                                window.dispatchEvent(new CustomEvent('sw-update-available'));
                            }
                        });
                    });
                })
                .catch(err => console.warn('[SW] Registration failed:', err));
        }

        // Install prompt — capture for use in app
        window.deferredInstallPrompt = null;
        window.addEventListener('beforeinstallprompt', e => {
            e.preventDefault();
            window.deferredInstallPrompt = e;
            window.dispatchEvent(new CustomEvent('pwa-installable'));
        });

        window.addEventListener('appinstalled', () => {
            window.deferredInstallPrompt = null;
            console.log('[PWA] App installed');
        });
    </script>
    <!-- BROKEN-IMAGE FALLBACK — replaces any failed image with a subtle on-brand placeholder
         instead of a broken-image icon. Uses capture phase since 'error' events don't bubble. -->
    <script>
        (function () {
            var PLACEHOLDER = "data:image/svg+xml," + encodeURIComponent(
                "<svg xmlns='http://www.w3.org/2000/svg' width='400' height='400'>" +
                "<rect width='100%' height='100%' fill='#F5F0E1'/>" +
                "<text x='50%' y='53%' font-family='Playfair Display, serif' font-size='70' " +
                "fill='#C8973A' text-anchor='middle' opacity='0.55'>&#10022;</text></svg>");
            document.addEventListener('error', function (e) {
                var el = e.target;
                if (el && el.tagName === 'IMG' && !el.dataset.imgFallback) {
                    el.dataset.imgFallback = '1';
                    el.src = PLACEHOLDER;
                }
            }, true);
        })();
    </script>
    <script>
        window.downloadFileFromBytes = (base64, filename, mimeType) => {
            const bytes = atob(base64);
            const arr   = new Uint8Array(bytes.length);
            for (let i = 0; i < bytes.length; i++) arr[i] = bytes.charCodeAt(i);
            const blob  = new Blob([arr], { type: mimeType });
            const url   = URL.createObjectURL(blob);
            const a     = document.createElement('a');
            a.href      = url; a.download = filename; a.click();
            URL.revokeObjectURL(url);
        };
    </script>
