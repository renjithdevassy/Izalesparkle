<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=1920">
    <title>Izale Sparkle — TV Dashboard</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>

<!-- ── LOGIN SCREEN ──────────────────────────── -->
<div id="login-screen" class="screen active">
    <div class="login-logo">IZALE <span>SPARKLE</span></div>
    <div class="login-subtitle">Admin Dashboard</div>
    <div class="login-box">
        <div class="login-field">
            <label>Email</label>
            <input type="email" id="login-email" value="renjithdevassy@gmail.com" autocomplete="off">
        </div>
        <div class="login-field">
            <label>Password</label>
            <input type="password" id="login-password" value="Renjithanoopy1!">
        </div>
        <button class="btn-login" id="login-btn">Sign In</button>
        <div class="login-error" id="login-error"></div>
    </div>
</div>

<!-- ── MAIN SCREEN ────────────────────────────── -->
<div id="main-screen" class="screen">

    <!-- Sidebar -->
    <nav class="sidebar">
        <div class="sidebar-logo">✦ IZALE</div>
        <div class="nav-item active" data-page="dashboard" data-nav="sidebar">
            <span class="nav-icon">📊</span> Dashboard
        </div>
        <div class="nav-item" data-page="orders" data-nav="sidebar">
            <span class="nav-icon">📦</span> Orders
        </div>
        <div class="sidebar-spacer"></div>
        <div class="nav-item" id="nav-logout" data-nav="sidebar">
            <span class="nav-icon">🚪</span> Logout
        </div>
        <div class="sidebar-time" id="sidebar-time"></div>
    </nav>

    <!-- Content -->
    <div class="content">

        <!-- Dashboard Page -->
        <div id="dashboard-page" class="page active">
            <div class="page-title">Dashboard</div>

            <div class="stats-grid" id="stats-grid">
                <div class="stat-card gold">
                    <div class="stat-icon">💰</div>
                    <div class="stat-value" id="stat-revenue">—</div>
                    <div class="stat-label">Total Revenue</div>
                </div>
                <div class="stat-card green">
                    <div class="stat-icon">📦</div>
                    <div class="stat-value" id="stat-orders">—</div>
                    <div class="stat-label">Total Orders</div>
                </div>
                <div class="stat-card orange">
                    <div class="stat-icon">⏳</div>
                    <div class="stat-value" id="stat-pending">—</div>
                    <div class="stat-label">Pending</div>
                </div>
                <div class="stat-card blue">
                    <div class="stat-icon">☀️</div>
                    <div class="stat-value" id="stat-today">—</div>
                    <div class="stat-label">Today Revenue</div>
                </div>
            </div>

            <div class="section-title">Recent Orders</div>
            <div id="recent-orders-wrap">
                <div class="loading"><div class="spinner"></div> Loading...</div>
            </div>
        </div>

        <!-- Orders Page -->
        <div id="orders-page" class="page">
            <div class="page-title">All Orders</div>
            <div class="orders-list-wrap" id="orders-list-wrap">
                <div class="loading"><div class="spinner"></div> Loading...</div>
            </div>
        </div>

        <!-- Order Detail Page -->
        <div id="detail-page" class="page">
            <div class="detail-header">
                <div>
                    <div class="detail-number" id="detail-number"></div>
                    <div class="detail-date" id="detail-date"></div>
                </div>
                <div id="detail-status"></div>
            </div>
            <div class="detail-grid" id="detail-grid"></div>
        </div>

    </div>
</div>

<!-- ── NOTIFICATION BANNER ────────────────────── -->
<div id="notification">
    <div class="notif-icon">🛍️</div>
    <div class="notif-text">
        <div class="notif-title" id="notif-title">New Order!</div>
        <div class="notif-body" id="notif-body"></div>
    </div>
</div>

<script src="js/app.js"></script>
</body>
</html>
